# Nginx configuration — HTTP only (used before certificate is issued)
# This file is replaced by nginx-ssl.conf after Certbot issues the certificate.

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to app while certificate is being issued
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        client_max_body_size 50M;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
